name: ospf-auth-routing-profile
terraform_provider_config:
  description: OSPF Auth Routing Profile
  skip_resource: false
  skip_datasource: false
  resource_type: entry
  resource_variants:
  - singular
  suffix: ospf_auth_routing_profile
  plural_suffix: ''
  plural_name: ''
  plural_description: ''
  custom_validation: false
go_sdk_config:
  skip: false
  package:
  - network
  - routing-profile
  - ospf
  - authprofile
panos_xpath:
  path:
  - network
  - routing-profile
  - ospf
  - auth-profile
  vars: []
locations:
- name: ngfw
  xpath:
    path:
    - config
    - devices
    - $ngfw_device
    vars:
    - name: ngfw_device
      description: The NGFW device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
  description: Located in a specific NGFW device
  devices:
  - ngfw
  validators: []
  required: false
  read_only: false
- name: template
  xpath:
    path:
    - config
    - devices
    - $panorama_device
    - template
    - $template
    - config
    - devices
    - $ngfw_device
    vars:
    - name: panorama_device
      description: Specific Panorama device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: template
      description: Specific Panorama template
      required: true
      validators: []
      type: entry
    - name: ngfw_device
      description: The NGFW device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
  description: Located in a specific template
  devices:
  - panorama
  validators: []
  required: false
  read_only: false
- name: template-stack
  xpath:
    path:
    - config
    - devices
    - $panorama_device
    - template-stack
    - $template_stack
    - config
    - devices
    - $ngfw_device
    vars:
    - name: panorama_device
      description: Specific Panorama device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: template_stack
      description: Specific Panorama template stack
      required: true
      validators: []
      type: entry
    - name: ngfw_device
      description: The NGFW device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
  description: Located in a specific template stack
  devices:
  - panorama
  validators: []
  required: false
  read_only: false
entries:
- name: name
  description: ''
  validators: []
spec:
  params: []
  variants:
  - name: md5
    type: list
    profiles:
    - xpath:
      - md5
      - entry
      type: entry
    validators: []
    spec:
      type: object
      items:
        type: object
        spec:
          params:
          - name: key
            type: string
            profiles:
            - xpath:
              - key
            validators:
            - type: length
              spec:
                max: 16
            spec: {}
            description: key for the authentication
            required: false
            hashing:
              type: solo
          - name: preferred
            type: bool
            profiles:
            - xpath:
              - preferred
            validators: []
            spec: {}
            description: use this key when sending packet
            required: false
          variants: []
    description: ''
    required: false
    codegen_overrides:
      terraform:
        variant_check: Disabled
    variant_group_id: 0
  - name: password
    type: string
    profiles:
    - xpath:
      - password
    validators:
    - type: length
      spec:
        max: 8
    spec: {}
    description: Simple password authentication
    required: false
    hashing:
      type: solo
    variant_group_id: 0
