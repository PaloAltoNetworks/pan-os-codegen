        profiles:
        - xpath:
          - enable
        validators: []
        spec: {}
        description: Enable (default) or Disable
        required: false
      - name: metric
        type: int64
        profiles:
        - xpath:
          - metric
        validators:
        - type: length
          spec:
            min: 0
            max: 4294967295
        spec: {}
        description: Set Metric (Field ignored if route-map configured).
        required: false
      - name: metric-type
        type: enum
        profiles:
        - xpath:
          - metric-type
        validators:
        - type: values
          spec:
            values:
            - type-1
            - type-2
        spec:
          default: type-2
          values:
          - value: type-1
          - value: type-2
        description: Set Metric-Type (Field ignored if route-map configured).
        required: false
      - name: route-map
        type: string
        profiles:
        - xpath:
          - route-map
        validators:
        - type: length
          spec:
            max: 63
        spec: {}
        description: Apply Route-Map on Redistributed Routes
