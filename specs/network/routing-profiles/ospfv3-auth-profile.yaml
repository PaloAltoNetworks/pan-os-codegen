    required: false
  variants:
  - name: ah
    type: object
    profiles:
    - xpath:
      - ah
    validators: []
    spec:
      params: []
      variants:
      - name: md5
        type: object
        profiles:
        - xpath:
          - md5
        validators: []
        spec:
          params:
          - name: key
            type: string
            profiles:
            - xpath:
              - key
            validators:
