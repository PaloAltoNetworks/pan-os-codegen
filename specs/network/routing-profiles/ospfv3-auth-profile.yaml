            required: false
            variant_group_id: 0
          - name: sha384
            type: object
            profiles:
            - xpath:
              - sha384
            validators: []
            spec:
              params:
              - name: key
                type: string
                profiles:
                - xpath:
                  - key
                validators:
                - type: length
                  spec:
                    max: 255
                spec: {}
                description: hex format xxxxxxxx[-xxxxxxxx]... total 12 sections
