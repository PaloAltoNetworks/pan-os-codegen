            validators: []
            spec:
              params:
              - name: key
                type: string
                profiles:
                - xpath:
                  - key
                validators:
                - type: length
                  spec:
                    max: 255
                spec: {}
                description: hex format xxxxxxxx[-xxxxxxxx]... total 4 sections
                required: false
                hashing:
                  type: solo
              variants: []
            description: key is 128 bit
            required: false
            variant_group_id: 0
          - name: none
            type: object
            profiles:
            - xpath:
              - none
            validators: []
            spec:
              params: []
              variants: []
            description: no authentication
            required: false
            variant_group_id: 0
          - name: sha1
            type: object
            profiles:
            - xpath:
              - sha1
            validators: []
            spec:
              params:
              - name: key
                type: string
                profiles:
                - xpath:
                  - key
                validators:
                - type: length
                  spec:
