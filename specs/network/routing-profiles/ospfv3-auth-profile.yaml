              spec:
                max: 255
            spec: {}
            description: hex format xxxxxxxx[-xxxxxxxx]... total 4 sections
            required: false
            hashing:
              type: solo
          variants: []
        description: key is 128 bit
        required: false
        variant_group_id: 0
      - name: sha1
        type: object
        profiles:
