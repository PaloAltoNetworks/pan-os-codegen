            hashing:
              type: solo
          variants: []
        description: key is 256 bit
        required: false
        variant_group_id: 0
      - name: sha384
        type: object
        profiles:
        - xpath:
          - sha384
        validators: []
        spec:
          params:
          - name: key
            type: string
            profiles:
            - xpath:
