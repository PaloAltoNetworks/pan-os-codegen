name: data-filtering-profile
terraform_provider_config:
  description: Data Filtering Security Profile
  skip_resource: false
  skip_datasource: false
  resource_type: entry
  resource_variants:
  - singular
  suffix: data_filtering_security_profile
  plural_suffix: ''
  plural_name: ''
  plural_description: ''
  custom_validation: false
go_sdk_config:
  skip: false
  package:
  - device
  - profiles
  - datafiltering
panos_xpath:
  path:
  - profiles
  - data-filtering
  vars: []
locations:
- name: shared
  xpath:
    path:
    - config
    - shared
    vars: []
  description: Panorama shared object
  devices:
  - panorama
  - ngfw
  validators: []
  required: false
  read_only: false
- name: vsys
  xpath:
    path:
    - config
    - devices
    - $ngfw_device
    - vsys
    - $vsys
    vars:
    - name: ngfw_device
      description: The NGFW device name
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: vsys
      description: The Virtual System name
      required: false
      default: vsys1
      validators:
      - type: not-values
        spec:
          values:
          - value: shared
            error: The vsys name cannot be "shared". Use the "shared" location instead
      type: entry
  description: Located in a specific Virtual System
  devices:
  - ngfw
  validators: []
  required: false
  read_only: false
- name: device-group
  xpath:
    path:
    - config
    - devices
    - $panorama_device
    - device-group
    - $device_group
    vars:
    - name: panorama_device
      description: Panorama device name
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: device_group
      description: Device Group name
      required: true
      validators:
      - type: not-values
        spec:
          values:
          - value: shared
            error: The device group name cannot be "shared". Use the "shared" location
              instead
      type: entry
      location_filter: true
  description: Located in a specific Device Group
  devices:
  - panorama
  validators: []
  required: false
  read_only: false
- name: template
  xpath:
    path:
    - config
    - devices
    - $panorama_device
    - template
    - $template
    - config
    - shared
    vars:
    - name: panorama_device
      description: Specific Panorama device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: template
      description: Specific Panorama template
      required: true
      validators: []
      type: entry
  description: A shared resource located within a specific template
  devices:
  - panorama
  validators: []
  required: false
  read_only: false
- name: template-vsys
  xpath:
    path:
    - config
    - devices
    - $panorama_device
    - template
    - $template
    - config
    - devices
    - $ngfw_device
    - vsys
    - $vsys
    vars:
    - name: panorama_device
      description: Specific Panorama device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: template
      description: Specific Panorama template
      required: true
      validators: []
      type: entry
    - name: ngfw_device
      description: The NGFW device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: vsys
      description: The vsys.
      required: false
      default: vsys1
      validators:
      - type: not-values
        spec:
          values:
          - value: shared
            error: The vsys cannot be "shared".
      type: entry
  description: Located in a specific template, device and vsys.
  devices:
  - panorama
  - ngfw
  validators: []
  required: false
  read_only: false
- name: template-stack
  xpath:
    path:
    - config
    - devices
    - $panorama_device
    - template-stack
    - $template_stack
    - config
    - shared
    vars:
    - name: panorama_device
      description: Specific Panorama device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: template_stack
      description: The template stack
      required: true
      validators: []
      type: entry
  description: Located in a specific template stack
  devices:
  - panorama
  validators: []
  required: false
  read_only: false
- name: template-stack-vsys
  xpath:
    path:
    - config
    - devices
    - $panorama_device
    - template-stack
    - $template_stack
    - config
    - devices
    - $ngfw_device
    - vsys
    - $vsys
    vars:
    - name: panorama_device
      description: Specific Panorama device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: template_stack
      description: The template stack
      required: true
      validators: []
      type: entry
    - name: ngfw_device
      description: The NGFW device
      required: false
      default: localhost.localdomain
      validators: []
      type: entry
    - name: vsys
      description: The vsys.
      required: false
      default: vsys1
      validators:
      - type: not-values
        spec:
          values:
          - value: shared
            error: The vsys cannot be "shared".
      type: entry
  description: Located in a specific template stack, device and vsys.
  devices:
  - panorama
  - ngfw
  validators: []
  required: false
  read_only: false
entries:
- name: name
  description: ''
  validators: []
spec:
  params:
  - name: data-capture
    type: bool
    profiles:
    - xpath:
      - data-capture
    validators: []
    spec: {}
    description: Enable data capture
    required: false
  - name: description
    type: string
    profiles:
    - xpath:
      - description
    validators:
    - type: length
      spec:
        min: 0
        max: 255
    spec: {}
    description: ''
    required: false
  - name: disable-override
    type: enum
    profiles:
    - xpath:
      - disable-override
    validators:
    - type: values
      spec:
        values:
        - 'yes'
        - 'no'
    spec:
      default: 'no'
      values:
      - value: 'yes'
      - value: 'no'
    description: Disable object override in child device groups
    required: false
  - name: rules
    type: list
    profiles:
    - xpath:
      - rules
      - entry
      type: entry
    validators: []
    spec:
      type: object
      items:
        type: object
        spec:
          params:
          - name: data-object
            type: string
            profiles:
            - xpath:
              - data-object
            validators: []
            spec: {}
            description: Name of the data pattern object
            required: false
          - name: direction
            type: enum
            profiles:
            - xpath:
              - direction
            validators:
            - type: values
              spec:
                values:
                - upload
                - download
                - both
            spec:
              default: both
              values:
              - value: upload
              - value: download
              - value: both
            description: Direction of data transfer to monitor
            required: false
          - name: alert-threshold
            type: int64
            profiles:
            - xpath:
              - alert-threshold
            validators:
            - type: length
              spec:
                min: 0
                max: 65535
            spec:
              default: 1
            description: Alert threshold count
            required: false
          - name: block-threshold
            type: int64
            profiles:
            - xpath:
              - block-threshold
            validators:
            - type: length
              spec:
                min: 0
                max: 65535
            spec:
              default: 1
            description: Block threshold count
            required: false
          - name: log-severity
            type: string
            profiles:
            - xpath:
              - log-severity
            validators: []
            spec:
              default: informational
            description: Log severity for matched traffic
            required: false
          - name: application
            type: list
            profiles:
            - xpath:
              - application
              type: member
            validators: []
            spec:
              type: string
              items:
                type: string
            description: Applications to match
            required: false
          - name: file-type
            type: list
            profiles:
            - xpath:
              - file-type
              type: member
            validators: []
            spec:
              type: string
              items:
                type: string
            description: File types to match
            required: false
          variants: []
    description: Data filtering rules
    required: false
  variants: []
